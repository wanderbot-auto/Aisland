<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aisland Cute Pet Pixel Glyph Options</title>
  <style>
    :root {
      --bg: #08070c;
      --panel: rgba(28, 25, 34, 0.82);
      --panel-2: rgba(255, 255, 255, 0.065);
      --line: rgba(255, 226, 240, 0.18);
      --text: #fff8fb;
      --muted: #d3bcc8;
      --cream: #fff0cf;
      --pink: #ff9fc6;
      --mint: #8ff0c5;
      --sky: #8ddcff;
      --lilac: #cdb4ff;
      --peach: #ffbd88;
      --pixel-gap: 2px;
      color-scheme: dark;
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 12%, rgba(255, 159, 198, 0.24), transparent 30%),
        radial-gradient(circle at 84% 10%, rgba(141, 220, 255, 0.18), transparent 28%),
        radial-gradient(circle at 48% 92%, rgba(143, 240, 197, 0.16), transparent 34%),
        linear-gradient(145deg, #09070d 0%, #15101c 48%, #080a10 100%);
    }

    main {
      width: min(1180px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: end;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--pink);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 800px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.94;
      letter-spacing: -0.06em;
    }

    .intro {
      margin: 14px 0 0;
      max-width: 790px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 360px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: #ffe7f0;
      background: rgba(255, 255, 255, 0.06);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      min-height: 346px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.025)),
        var(--panel);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .card::before {
      inset: -56px -78px auto auto;
      width: 160px;
      height: 160px;
      background: var(--accent);
      opacity: 0.22;
      filter: blur(24px);
    }

    .card::after {
      left: 18px;
      bottom: 16px;
      width: 54px;
      height: 14px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 76px -240px 0 rgba(255,255,255,0.06), 132px -38px 0 rgba(255,255,255,0.045);
      transform: rotate(-7deg);
    }

    .card-head {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
      z-index: 1;
    }

    .index {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 12px;
      color: #140b12;
      background: var(--accent);
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 0 24px color-mix(in srgb, var(--accent), transparent 42%);
    }

    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .tag {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      height: 138px;
      margin: 20px 0 14px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.095);
      background:
        radial-gradient(circle at 50% 44%, color-mix(in srgb, var(--accent), transparent 72%), transparent 48%),
        radial-gradient(circle at 28% 70%, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(0,0,0,0.16)),
        #111018;
    }

    .island-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 126px;
      min-height: 44px;
      padding: 10px 15px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(12, 11, 17, 0.84);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.10),
        0 14px 40px rgba(0, 0, 0, 0.42),
        0 0 30px color-mix(in srgb, var(--accent), transparent 68%);
    }

    .pixel-art {
      --cell: 5px;
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell));
      grid-auto-rows: var(--cell);
      gap: var(--pixel-gap);
      image-rendering: pixelated;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent), transparent 42%));
      transform: scale(1.02);
      transform-origin: center;
    }

    .pixel {
      width: var(--cell);
      height: var(--cell);
      border-radius: 1.4px;
      background: transparent;
    }

    .p1 { background: var(--accent); }
    .p2 { background: color-mix(in srgb, var(--accent), white 38%); }
    .p3 { background: color-mix(in srgb, var(--accent), black 28%); }
    .p4 { background: #fffaf2; }
    .p5 { background: #ff8fb8; }
    .p6 { background: #ffc56f; }
    .p7 { background: #19141d; }

    .state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
    }

    .meta {
      position: relative;
      display: grid;
      gap: 9px;
      z-index: 1;
    }

    .line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 15px;
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.065);
    }

    .line span:first-child {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .line code {
      color: #fff6fb;
      font-size: 12px;
      font-weight: 850;
      font-family: "SF Mono", ui-monospace, monospace;
    }

    .notes {
      min-height: 48px;
      margin: 0;
      color: #e2cbd7;
      font-size: 12px;
      line-height: 1.55;
    }

    .notice {
      margin-top: 18px;
      color: #c7aebe;
      font-size: 12px;
      line-height: 1.7;
    }

    @keyframes pet-bounce {
      0%, 100% { transform: translateY(0) scale(1.02) rotate(0deg); }
      30% { transform: translateY(-3px) scale(1.04) rotate(-1deg); }
      60% { transform: translateY(0) scale(1.02) rotate(1deg); }
    }

    .card:hover .pixel-art { animation: pet-bounce 0.82s steps(3, end) infinite; }

    @media (max-width: 1050px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      header { grid-template-columns: 1fr; }
      .legend { justify-content: flex-start; }
    }

    @media (max-width: 680px) {
      main { width: min(100vw - 22px, 480px); padding-top: 24px; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 314px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section>
        <p class="eyebrow">Aisland Pixel Pet Lab</p>
        <h1>10 个更俏皮可爱的宠物像素图形备选</h1>
        <p class="intro">这一版弱化“网站吉祥物致敬”，统一改成小宠物和陪伴感角色：圆脸、软色、短名字、低攻击性轮廓，更适合放在 Aisland 的刘海小胶囊里长期显示。</p>
      </section>
      <section class="legend" aria-label="Legend">
        <span class="chip">9x9 / 10x10 矩阵</span>
        <span class="chip">圆脸宠物感</span>
        <span class="chip">Hover 弹跳预览</span>
      </section>
    </header>

    <section class="grid" id="glyphGrid"></section>

    <p class="notice">建议：加入产品时可先挑 3-4 个作为内置款，例如猫、柴犬、兔子、鸭鸭；其余作为后续主题包。名称尽量用原创宠物名，避免直接绑定第三方品牌或官方吉祥物。</p>
  </main>

  <script>
    const glyphs = [

        accent: "#ffd08a",
        notes: "圆脸、猫耳、腮红都很清楚；比品牌标记更像一个陪伴型小宠物。",
        matrix: [
          "030000030",
          "333000333",
          "322222223",
          "324224423",
          "322222223",
          "025555520",
          "002222200",
          "030222030",
          "300000003"
        ]
      },
      {
        title: "Mochi Shiba",
        tag: "糯米柴犬 · 活力提醒",
        enumCase: "mochiShiba",
        accent: "#ffb36b",
        notes: "柴犬耳朵和小围脖很可爱，适合运行中、完成后的小奖励反馈。",
        matrix: [
          "060000060",
          "666000666",

          "632424236",
          "633666336",

          "006666600",

        matrix: [
          "020020000",
          "022022000",
          "022222000",
          "024242000",
          "022222000",
          "002555200",
          "022222200",
          "220000220",
          "200000020"
        ]
      },
      {
        title: "Nap Panda",
        tag: "午睡熊猫 · 慢节奏",
        enumCase: "napPanda",
        accent: "#e9f1ff",
        notes: "黑眼圈用深色像素表现，情绪更软；适合低打扰、后台观察类状态。",
        matrix: [
          "077000770",
          "772222277",
          "724722427",
          "722222227",
          "722666227",
          "077222770",
          "007777700",
          "070222070",
          "700000007"
        ]
      },
      {
        title: "Toast Hamster",
        tag: "吐司仓鼠 · 软乎乎",
        enumCase: "toastHamster",
        accent: "#f6c785",
        notes: "方圆轮廓像一片吐司，也像仓鼠脸；非常适合像素网格。",
        matrix: [
          "033333330",
          "322222223",
          "322424223",
          "322222223",
          "322666223",
          "325555523",
          "322222223",
          "033333330",
          "003000300"
        ]
      },
      {
        title: "Jelly Axolotl",
        tag: "果冻六角恐龙 · 奇妙宠物",
        enumCase: "jellyAxolotl",
        accent: "#ff9fc6",
        notes: "外侧鳃羽有很强记忆点，俏皮但不吵；适合作为个性化亮点款。",
        matrix: [
          "500000005",
          "550222055",
          "052222250",
          "522424225",
          "052222250",
          "005555500",
          "002222200",
          "020000020",
          "200000002"
        ]
      },
      {
        title: "Cloud Alpaca",
        tag: "云朵羊驼 · 治愈陪伴",
        enumCase: "cloudAlpaca",
        accent: "#d8c7ff",
        notes: "蓬松头顶和长脖子有辨识度；适合做温柔主题或休息提醒。",
        matrix: [
          "002222000",
          "022222200",
          "222242220",
          "222222220",
          "022555200",
          "002222000",
          "002222000",
          "002002000",
          "020000200"
        ]
      },
      {
        title: "Sprout Turtle",
        tag: "发芽小龟 · 稳定推进",
        enumCase: "sproutTurtle",
        accent: "#8ff0c5",
        notes: "小龟代表稳步执行，头顶嫩芽增加萌点；适合长任务和构建任务。",
        matrix: [
          "000020000",
          "000222000",
          "000020000",
          "002222200",
          "022424220",
          "222222222",
          "022666220",
          "202222202",
          "020000020"
        ]
      },
      {
        title: "Pocket Penguin",
        tag: "口袋企鹅 · 冷静值守",
        enumCase: "pocketPenguin",
        accent: "#8ddcff",
        notes: "深色外套、白肚皮、黄色小脚，很适合深色玻璃岛屿。",
        matrix: [
          "007777700",
          "077222770",
          "072424270",
          "072222270",
          "072666270",
          "007222700",
          "000777000",
          "006000600",
          "060000060"
        ]
      },
      {
        title: "Tiny Otter",
        tag: "抱石小水獭 · 亲密感",
        enumCase: "tinyOtter",
        accent: "#c99a6b",
        notes: "抱着小贝壳/石头的姿态很讨喜；适合表达“我在帮你守着任务”。",
        matrix: [
          "003333000",
          "032222300",
          "322424230",
          "322222230",
          "032666300",
          "003222000",
          "022444220",
          "220333022",
          "200000002"
        ]
      }
    ];

    const grid = document.getElementById("glyphGrid");

    function renderGlyph(glyph, index) {
      const card = document.createElement("article");
      card.className = "card";
      card.style.setProperty("--accent", glyph.accent);

      const cols = Math.max(...glyph.matrix.map(row => row.length));
      const pixels = glyph.matrix.flatMap(row => {
        const padded = row.padEnd(cols, "0");
        return [...padded].map(value => `<span class="pixel ${value === "0" ? "" : `p${value}`}"></span>`).join("");
      }).join("");

      card.innerHTML = `
        <div class="card-head">
          <div>
            <h2>${glyph.title}</h2>
            <div class="tag">${glyph.tag}</div>
          </div>
          <span class="index">${String(index + 1).padStart(2, "0")}</span>
        </div>
        <div class="stage">
          <div class="island-bar">
            <div class="pixel-art" style="--cols: ${cols}">${pixels}</div>
            <span class="state-dot"></span>
          </div>
        </div>
        <div class="meta">
          <div class="line"><span>Enum</span><code>${glyph.enumCase}</code></div>
          <div class="line"><span>Accent</span><code>${glyph.accent}</code></div>
          <p class="notes">${glyph.notes}</p>
        </div>
      `;

      grid.appendChild(card);
    }

    glyphs.forEach(renderGlyph);
  </script>
</body>
</html>
