<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aisland Pixel Glyph Options</title>
  <style>
    :root {
      --bg: #07090d;
      --panel: rgba(18, 22, 29, 0.82);
      --panel-2: rgba(29, 35, 45, 0.72);
      --line: rgba(189, 216, 255, 0.13);
      --text: #edf6ff;
      --muted: #93a5b8;
      --cyan: #00d1ff;
      --mint: #7ee787;
      --amber: #ffcb6b;
      --rose: #ff8a80;
      --violet: #caa9ff;
      --pixel-gap: 2px;
      color-scheme: dark;
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(0, 209, 255, 0.18), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(126, 231, 135, 0.14), transparent 26%),
        radial-gradient(circle at 54% 92%, rgba(255, 203, 107, 0.12), transparent 32%),
        linear-gradient(145deg, #030406 0%, #0b1119 48%, #06080d 100%);
    }

    main {
      width: min(1180px, calc(100vw - 36px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: end;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.94;
      letter-spacing: -0.06em;
    }

    .intro {
      margin: 14px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 350px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: #c8d7e8;
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      min-height: 330px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.02)),
        var(--panel);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -60px -80px auto auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.18;
      filter: blur(24px);
    }

    .card-head {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      min-height: 56px;
    }

    .index {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 10px;
      color: #051018;
      background: var(--accent);
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 0 24px color-mix(in srgb, var(--accent), transparent 44%);
    }

    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .tag {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      height: 132px;
      margin: 20px 0 14px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--accent), transparent 76%), transparent 48%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.18)),
        #0b0f14;
    }

    .island-bar {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 112px;
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(11, 14, 18, 0.82);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 14px 40px rgba(0, 0, 0, 0.42),
        0 0 30px color-mix(in srgb, var(--accent), transparent 70%);
    }

    .pixel-art {
      --cell: 5px;
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell));
      grid-auto-rows: var(--cell);
      gap: var(--pixel-gap);
      image-rendering: pixelated;
      filter: drop-shadow(0 0 8px color-mix(in srgb, var(--accent), transparent 46%));
      transform: scale(1.02);
      transform-origin: center;
    }

    .pixel {
      width: var(--cell);
      height: var(--cell);
      border-radius: 1px;
      background: transparent;
    }

    .p1 { background: var(--accent); }
    .p2 { background: color-mix(in srgb, var(--accent), white 34%); }
    .p3 { background: color-mix(in srgb, var(--accent), black 34%); }
    .p4 { background: #f7fbff; }
    .p5 { background: var(--rose); }
    .p6 { background: var(--amber); }

    .state-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
    }

    .meta {
      position: relative;
      display: grid;
      gap: 9px;
    }

    .line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .line span:first-child {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .line code {
      color: #e9f5ff;
      font-size: 12px;
      font-weight: 800;
      font-family: "SF Mono", ui-monospace, monospace;
    }

    .notes {
      min-height: 48px;
      margin: 0;
      color: #b6c7d9;
      font-size: 12px;
      line-height: 1.55;
    }

    .notice {
      margin-top: 18px;
      color: #8fa2b6;
      font-size: 12px;
      line-height: 1.7;
    }

    @keyframes idle-bob {
      0%, 100% { transform: translateY(0) scale(1.02); }
      50% { transform: translateY(-2px) scale(1.02); }
    }

    .card:hover .pixel-art { animation: idle-bob 0.72s steps(2, end) infinite; }

    @media (max-width: 1050px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      header { grid-template-columns: 1fr; }
      .legend { justify-content: flex-start; }
    }

    @media (max-width: 680px) {
      main { width: min(100vw - 22px, 480px); padding-top: 24px; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 300px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section>
        <p class="eyebrow">Aisland Pixel Glyph Lab</p>
        <h1>10 个可加入个性化设置的像素图形备选</h1>
        <p class="intro">这些方案适合映射到 <code>IslandPixelShapeStyle</code>，用矩阵像素绘制而不是图片资源。包含动物主题，也包含对知名网站/工具吉祥物的非官方像素化致敬。</p>
      </section>
      <section class="legend" aria-label="Legend">
        <span class="chip">9x9 / 10x10 矩阵</span>
        <span class="chip">适合刘海小尺寸</span>
        <span class="chip">Hover 预览动效</span>
      </section>
    </header>

    <section class="grid" id="glyphGrid"></section>

    <p class="notice">说明：GitHub、Docker、Reddit、Rust、Claude 等名称仅用于标注灵感来源；实际加入产品时建议使用“Octo Cat Inspired / Whale / Robot / Crab / Glow Moth”等非官方名称，避免误用商标或官方吉祥物资产。</p>
  </main>

        matrix: [
          "030000030",
          "330000333",
          "322222223",
          "324224423",
          "322222223",
          "022555220",
          "002222000",
          "032000230",
          "330000033"
        ]

      {

          "324232423",
          "322666223",
          "332222233",
          "033333330",
          "003303300",
          "000303000"
        ]
      },
      {
        title: "Moon Rabbit",
        tag: "动物主题 · 安静 / 轻盈 / 夜间",
        enumCase: "moonRabbit",
        accent: "#f2f7ff",
        notes: "白色主题感强，适合浅色或石墨主题；轮廓干净，静止状态也好看。",
        matrix: [
          "020020000",
          "022022000",
          "022222000",
          "024242000",
          "022222000",

          "022222200",
          "220000220",
          "200000020"
        ]
      },
      {
        title: "Debug Duck",

        enumCase: "debugDuck",
        accent: "#ffcb6b",
        notes: "开发者心智很强，适合编码助手；黄色在深色岛屿上非常醒目。",
        matrix: [
          "000666000",
          "006664000",

          "066666660",

        accent: "#bbc9cf",
        notes: "猫耳 + 触手的轮廓在 9x9 里很有记忆点；适合 Git/workspace 相关状态。",
        matrix: [

        notes: "不用复刻品牌标识，只取暖色、对称、思考光源的感觉；适合 Claude 相关会话。",
        matrix: [
          "300020003",
          "330222033",

          "003666300",

        ]
      },
      {
        title: "Code Crab",
        tag: "Rust Ferris 灵感 · 非官方",
        enumCase: "codeCrab",
        accent: "#ff6b4a",
        notes: "横向钳子适合小胶囊；适合编译、构建、系统任务状态。",
        matrix: [
          "300000003",
          "330000033",
          "033333330",
          "032424230",
          "033666330",
          "303333303",
          "300303003",
          "030000030",
          "300000003"
        ]
      }
    ];

    const grid = document.getElementById("glyphGrid");

    function renderGlyph(glyph, index) {
      const card = document.createElement("article");
      card.className = "card";
      card.style.setProperty("--accent", glyph.accent);

      const cols = Math.max(...glyph.matrix.map(row => row.length));
      const pixels = glyph.matrix.flatMap(row => {
        const padded = row.padEnd(cols, "0");
        return [...padded].map(value => `<span class="pixel ${value === "0" ? "" : `p${value}`}"></span>`).join("");
      }).join("");

      card.innerHTML = `
        <div class="card-head">
          <div>
            <h2>${glyph.title}</h2>
            <div class="tag">${glyph.tag}</div>
          </div>
          <span class="index">${String(index + 1).padStart(2, "0")}</span>
        </div>
        <div class="stage">
          <div class="island-bar">
            <div class="pixel-art" style="--cols: ${cols}">${pixels}</div>
            <span class="state-dot"></span>
          </div>
        </div>
        <div class="meta">
          <div class="line"><span>Enum</span><code>${glyph.enumCase}</code></div>
          <div class="line"><span>Accent</span><code>${glyph.accent}</code></div>
          <p class="notes">${glyph.notes}</p>
        </div>
      `;

      grid.appendChild(card);
    }

    glyphs.forEach(renderGlyph);
  </script>
</body>
</html>
